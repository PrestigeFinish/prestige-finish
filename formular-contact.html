<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prestige Finish | Contact</title>

<style>
:root{
--bg:#050505;
--gold:#d4af37;
--text:#f5f2ea;
--muted:#c5bea9;
--line:rgba(212,175,55,0.18);
}

body{
margin:0;
font-family:Arial;
background:var(--bg);
color:var(--text);
}

.container{
width:min(900px,90%);
margin:auto;
}

section{
padding:60px 0;
}

h1{
font-size:36px;
margin-bottom:10px;
color:var(--gold);
}

p{
color:var(--muted);
margin-bottom:30px;
}

.card{
border:1px solid var(--line);
padding:30px;
border-radius:20px;
background:rgba(255,255,255,0.03);
}

.grid-2{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

input,textarea,select{
width:100%;
padding:14px;
border-radius:10px;
border:1px solid var(--line);
background:#0a0a0a;
color:white;
}

button{
width:100%;
padding:16px;
border-radius:999px;
border:none;
background:linear-gradient(135deg,var(--gold),#f0d266);
font-weight:bold;
cursor:pointer;
}

button:hover{
transform:translateY(-2px);
}

@media(max-width:700px){
.grid-2{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<section>
<div class="container">

<h1>Solicită programare</h1>
<p>Completează formularul și revenim rapid.</p>

<div class="card">

<form id="contactForm">

<input type="hidden" name="access_key" value="9c5a3e10-8db0-4dfa-a881-463b05232c80">
<input type="hidden" name="subject" value="Cerere nouă - Prestige Finish">
<input type="hidden" name="from_name" value="Website Prestige Finish">

<div class="grid-2">
<input type="text" name="name" placeholder="Nume / Firmă" required>
<input type="tel" name="phone" placeholder="Telefon" required>
</div>

<div class="grid-2">
<input type="email" name="email" placeholder="Email" required>

<select name="client_type" required>
<option value="">Tip client</option>
<option>Persoană fizică</option>
<option>Firmă / flotă</option>
</select>
</div>

<select name="service">
<option value="">Serviciu dorit</option>
<option>Detailing interior</option>
<option>Igienizare</option>
<option>Motor</option>
<option>Faruri</option>
<option>Pachet complet</option>
</select>

<textarea name="message" placeholder="Detalii"></textarea>

<button type="submit">Trimite solicitarea</button>

</form>

</div>

</div>
</section>

<script>
document.getElementById("contactForm").addEventListener("submit", async function(e){
e.preventDefault();

const formData = new FormData(this);

await fetch("https://api.web3forms.com/submit", {
method: "POST",
body: formData
});

window.location.href = "multumim.html";
});
</script>

</body>
</html>
