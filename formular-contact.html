<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Prestige Finish | Formular de contact</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">

    <style>
        .contact-form-wrap {
            min-height: 100vh;
            padding: 140px 0 80px;
        }

        .contact-form-box {
            max-width: 760px;
            margin: 0 auto;
            background: #1a1a1a;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.35);
        }

        .contact-form-box h1 {
            text-align: center;
            margin-bottom: 12px;
            color: #d4af37;
            font-size: 34px;
        }

        .contact-form-box p {
            text-align: center;
            color: #aaa;
            margin-bottom: 30px;
        }

        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .contact-form label {
            font-size: 15px;
            margin-bottom: 6px;
            color: #fff;
            display: block;
        }

        .contact-form input,
        .contact-form select,
        .contact-form textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #333;
            border-radius: 12px;
            background: #111;
            color: #fff;
            font-size: 15px;
            outline: none;
        }

        .contact-form input:focus,
        .contact-form select:focus,
        .contact-form textarea:focus {
            border-color: #d4af37;
        }

        .contact-form textarea {
            min-height: 140px;
            resize: vertical;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            .contact-form-box {
                padding: 26px 18px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .contact-form-wrap {
                padding: 120px 0 60px;
            }
        }
    </style>
</head>
<body>

<header>
    <div class="container navbar">
        <div class="logo">Prestige Finish</div>
        <div class="nav-links">
            <a href="index.html">Acasă</a>
            <a href="persoane-fizice.html">Persoane Fizice</a>
            <a href="flote.html">Flote</a>
            <a href="formular-contact.html">Contact</a>
        </div>
    </div>
</header>

<section class="contact-form-wrap">
    <div class="container">
        <div class="contact-form-box fade-in">
            <h1>Formular de contact</h1>
            <p>
                Trimite-ne câteva detalii și revenim cât mai rapid cu un răspuns.
            </p>

            <form class="contact-form" action="multumim.html" method="get">
                <div>
                    <label for="nume">Nume</label>
                    <input type="text" id="nume" name="nume" placeholder="Numele tău" required>
                </div>

                <div class="form-row">
                    <div>
                        <label for="telefon">Telefon</label>
                        <input type="tel" id="telefon" name="telefon" placeholder="07xx xxx xxx" required>
                    </div>

                    <div>
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="adresa ta de email">
                    </div>
                </div>

                <div class="form-row">
                    <div>
                        <label for="tip-client">Tip client</label>
                        <select id="tip-client" name="tip-client" required>
                            <option value="">Selectează</option>
                            <option value="persoana-fizica">Persoană fizică</option>
                            <option value="persoana-juridica">Persoană juridică / flotă</option>
                        </select>
                    </div>

                    <div>
                        <label for="interes">Serviciu dorit</label>
                        <select id="interes" name="interes" required>
                            <option value="">Selectează</option>
                            <option value="detailing-interior">Detailing interior</option>
                            <option value="igienizare">Igienizare tapițerie</option>
                            <option value="intretinere">Întreținere premium</option>
                            <option value="oferta-flota">Ofertă flotă / business</option>
                            <option value="altceva">Altceva</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label for="mesaj">Mesaj</label>
                    <textarea id="mesaj" name="mesaj" placeholder="Scrie-ne pe scurt ce ai nevoie..."></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Trimite solicitarea</button>
                    <a href="programari.html" class="btn btn-secondary">Mergi la programare</a>
                </div>
            </form>
        </div>
    </div>
</section>

<footer>
    <p>© 2026 Prestige Finish | Contact</p>
</footer>

<script src="script.js"></script>

</body>
</html>
