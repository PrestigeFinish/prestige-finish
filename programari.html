<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Prestige Finish | Programare online</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">

    <style>
        .booking-wrap {
            min-height: 100vh;
            padding: 140px 0 80px;
        }

        .booking-box {
            max-width: 800px;
            margin: 0 auto;
            background: #1a1a1a;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.35);
        }

        .booking-box h1 {
            text-align: center;
            margin-bottom: 10px;
            color: #d4af37;
            font-size: 34px;
        }

        .booking-box p {
            text-align: center;
            color: #aaa;
            margin-bottom: 30px;
        }

        .booking-form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .booking-form label {
            font-size: 14px;
            color: #fff;
            margin-bottom: 6px;
            display: block;
        }

        .booking-form input,
        .booking-form select,
        .booking-form textarea {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #333;
            background: #111;
            color: #fff;
            outline: none;
        }

        .booking-form input:focus,
        .booking-form select:focus,
        .booking-form textarea:focus {
            border-color: #d4af37;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .booking-actions {
            margin-top: 15px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .note {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .booking-box {
                padding: 26px 18px;
            }
        }
    </style>
</head>
<body>

<header>
    <div class="container navbar">
        <div class="logo">Prestige Finish</div>
        <div class="nav-links">
            <a href="index.html">Acasă</a>
            <a href="persoane-fizice.html">Persoane Fizice</a>
            <a href="flote.html">Flote</a>
            <a href="formular-contact.html">Contact</a>
        </div>
    </div>
</header>

<section class="booking-wrap">
    <div class="container">
        <div class="booking-box fade-in">

            <h1>Programare online</h1>
            <p>
                Completează formularul și rezervă un interval pentru serviciul dorit.
            </p>

            <form class="booking-form" action="multumim.html" method="get">

                <div>
                    <label>Nume</label>
                    <input type="text" required placeholder="Numele tău">
                </div>

                <div class="form-row">
                    <div>
                        <label>Telefon</label>
                        <input type="tel" required placeholder="07xx xxx xxx">
                    </div>

                    <div>
                        <label>Email</label>
                        <input type="email" placeholder="email (opțional)">
                    </div>
                </div>

                <div class="form-row">
                    <div>
                        <label>Serviciu</label>
                        <select required>
                            <option>Detailing interior</option>
                            <option>Igienizare</option>
                            <option>Pachet complet</option>
                        </select>
                    </div>

                    <div>
                        <label>Tip mașină</label>
                        <select required>
                            <option>Mică</option>
                            <option>Sedan</option>
                            <option>SUV</option>
                            <option>Van</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div>
                        <label>Data dorită</label>
                        <input type="date" required>
                    </div>

                    <div>
                        <label>Ora dorită</label>
                        <input type="time" required>
                    </div>
                </div>

                <div>
                    <label>Detalii suplimentare</label>
                    <textarea placeholder="Ex: interior foarte murdar, pete, animale, etc."></textarea>
                </div>

                <div class="booking-actions">
                    <button type="submit" class="btn btn-primary">Rezervă acum</button>
                    <a href="formular-contact.html" class="btn btn-secondary">Am întrebări</a>
                </div>

                <div class="note">
                    După trimitere, vei primi confirmarea programării.
                </div>

            </form>

        </div>
    </div>
</section>

<footer>
    <p>© 2026 Prestige Finish | Programări</p>
</footer>

<script src="script.js"></script>

</body>
</html>
