<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prestige Finish | Mulțumim</title>

  <style>
    :root {
      --bg:#050505;
      --gold:#d4af37;
      --text:#f5f2ea;
      --muted:#c5bea9;
      --line:rgba(212,175,55,0.18);
    }

    body{
      margin:0;
      font-family:Arial;
      background:var(--bg);
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      text-align:center;
    }

    .box{
      max-width:600px;
      padding:40px;
      border:1px solid var(--line);
      border-radius:20px;
      background:rgba(255,255,255,0.03);
    }

    h1{
      color:var(--gold);
      margin-bottom:10px;
    }

    p{
      color:var(--muted);
      margin-bottom:30px;
    }

    .btn{
      padding:14px 24px;
      border-radius:999px;
      background:linear-gradient(135deg,var(--gold),#f0d266);
      color:#000;
      text-decoration:none;
      font-weight:bold;
      display:inline-block;
    }

  </style>
</head>

<body>

<div class="box">
  <h1>Mulțumim!</h1>
  <p>Solicitarea ta a fost trimisă cu succes.<br>
  Revenim cât mai rapid pentru detalii.</p>

  <a href="index.html" class="btn">Înapoi pe site</a>
</div>

</body>
</html>
