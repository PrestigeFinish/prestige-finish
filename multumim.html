<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prestige Finish | Mulțumim</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <meta name="description" content="Mulțumim pentru solicitare. Revenim către tine cât mai curând." />

  <style>
    :root {
      --bg: #050505;
      --card: rgba(255,255,255,0.04);
      --gold: #d4af37;
      --text: #f5f2ea;
      --muted: #c5bea9;
      --line: rgba(212,175,55,0.18);
      --shadow: 0 20px 60px rgba(0,0,0,0.45);
      --green: #25D366;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top right, rgba(212,175,55,0.16), transparent 24%),
        radial-gradient(circle at bottom left, rgba(212,175,55,0.10), transparent 20%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .thankyou-card {
      width: min(760px, 100%);
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(212,175,55,0.08), rgba(255,255,255,0.03));
      border-radius: 32px;
      padding: 42px 30px;
      text-align: center;
      box-shadow: var(--shadow);
    }

    .logo {
      width: 110px;
      margin: 0 auto 18px;
      border-radius: 20px;
    }

    .tag {
      display: inline-flex;
      padding: 8px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--gold);
      background: rgba(212,175,55,0.07);
      font-size: 12px;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(34px, 6vw, 58px);
      line-height: 1.02;
      color: var(--gold);
    }

    p {
      margin: 0 auto 26px;
      max-width: 620px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.7;
    }

    .actions {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 28px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 54px;
      padding: 0 24px;
      border-radius: 999px;
      border: 1px solid transparent;
      font-weight: 700;
      text-align: center;
      text-decoration: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--gold), #f0d266);
      color: #0a0a0a;
    }

    .btn-secondary {
      background: transparent;
      border-color: var(--line);
      color: var(--text);
    }

    .small {
      margin-top: 26px;
      font-size: 14px;
      color: var(--muted);
    }

    @media (max-width: 640px) {
      .actions {
        flex-direction: column;
      }

      .actions .btn {
        width: 100%;
      }

      .thankyou-card {
        padding: 34px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="thankyou-card">
    <img src="logo.png" alt="Prestige Finish Logo" class="logo" />

    <div class="tag">Solicitare trimisă</div>

    <h1>Mulțumim!</h1>

    <p>
      Mesajul tău a fost trimis cu succes. Revenim către tine cât mai curând posibil
      cu un răspuns, o confirmare sau detaliile necesare.
    </p>

    <div class="actions">
      <a href="index.html" class="btn btn-primary">Înapoi la site</a>
      <a href="programari.html" class="btn btn-secondary">Programare online</a>
    </div>

    <div class="small">
      Prestige Finish • Strada Libertății, 107592 Ploiești • 0757 352 371
    </div>
  </div>
</body>
</html>
